# ====== CampusTrade 配置示例 ======
# 复制为 application-mysql.yml 并修改数据库密码
# 启动时指定: --spring.profiles.active=mysql

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/campus_trade?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: your_password_here

app:
  jwt:
    secret: change-this-to-a-random-string
    expiration: 86400000
  upload:
    path: ./uploads
