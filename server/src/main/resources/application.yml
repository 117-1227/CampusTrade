# ====== CampusTrade 默认开发环境 ======
# H2 免依赖启动: ./mvnw spring-boot:run -Dspring-boot.run.profiles=h2

spring:
  profiles:
    active: mysql
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

# CORS（所有 profile 共用）
app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
